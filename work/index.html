<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Work — Nifdel Rivera</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles/back-nav.css">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg:      #060608;
  --text:    rgba(255,255,255,0.88);
  --dim:     rgba(255,255,255,0.25);
  --border:  rgba(255,255,255,0.05);
  --ease:    cubic-bezier(.16,1,.3,1);
  --ease-in: cubic-bezier(.4,0,1,1);
  --font-body: 'Cormorant Garamond', serif;
  --font-mono: 'Space Mono', monospace;
}

html, body {
  width: 100%; height: 100%;
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ── PAGE FADE ── */
#pf-fade {
  position: fixed; inset: 0;
  background: var(--bg);
  z-index: 9999;
  pointer-events: none;
  opacity: 1;
  transition: opacity 450ms ease;
}
#pf-fade.out { opacity: 0; }

/* ── BACKGROUND PARTICLES ── */
#pf-bg {
  position: fixed; inset: 0;
  pointer-events: none;
  z-index: 0;
}
.bg-star {
  position: absolute;
  border-radius: 50%;
  background: rgba(255,255,255,0.55);
  animation: bgFloat linear infinite;
}
@keyframes bgFloat {
  0%   { transform: translateY(0) translateX(0); opacity: var(--op0); }
  50%  { opacity: var(--op1); }
  100% { transform: translateY(var(--dy)) translateX(var(--dx)); opacity: var(--op0); }
}

/* ── VIEW SWITCHER ── */
.pf-view { position: fixed; inset: 0; z-index: 10; }
.pf-view.hidden { pointer-events: none; }

/* ══ ROOMS VIEW ══════════════════════════════════════════ */
#pf-rooms {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
}

.rooms-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: 1fr 1fr;
  width: 72vw;
  height: 72vh;
  gap: 1px;
}

.room-cell {
  position: relative;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: 32px 36px;
  border: 1px solid rgba(255,255,255,0.0);
  cursor: pointer;
  overflow: hidden;
  transition: border-color .4s, background .4s;
  opacity: 0;
  transform: translateY(20px);
  transition: opacity .6s var(--ease), transform .6s var(--ease),
              border-color .3s, background .3s;
}
.room-cell.entered {
  opacity: 1;
  transform: translateY(0);
}
.room-cell:hover {
  border-color: rgba(var(--rr),var(--rg),var(--rb),.25);
  background: rgba(var(--rr),var(--rg),var(--rb),.04);
}

/* Room dim-when-other-hovered */
.rooms-grid:has(.room-cell:hover) .room-cell:not(:hover) {
  opacity: 0.35;
}

.room-bg-num {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -55%);
  font-family: var(--font-body);
  font-size: 22vw;
  font-weight: 300;
  color: rgba(255,255,255,0.02);
  line-height: 1;
  pointer-events: none;
  user-select: none;
  transition: color .4s;
}
.room-cell:hover .room-bg-num {
  color: rgba(var(--rr),var(--rg),var(--rb),0.05);
}

.room-tag {
  font-family: var(--font-mono);
  font-size: 8px; letter-spacing: .35em; text-transform: uppercase;
  color: rgba(var(--rr),var(--rg),var(--rb),.0);
  margin-bottom: 10px;
  transition: color .3s;
}
.room-cell:hover .room-tag {
  color: rgba(var(--rr),var(--rg),var(--rb),.7);
}

.room-name {
  font-family: var(--font-body);
  font-size: clamp(28px, 3.5vw, 52px);
  font-weight: 300;
  letter-spacing: -.01em;
  color: rgba(255,255,255,.25);
  line-height: 1.1;
  margin-bottom: 12px;
  transition: color .3s var(--ease);
}
.room-cell:hover .room-name {
  color: rgba(255,255,255,.88);
}

.room-count {
  font-family: var(--font-mono);
  font-size: 9px; letter-spacing: .2em;
  color: rgba(255,255,255,.12);
  transition: color .3s;
}
.room-cell:hover .room-count {
  color: rgba(255,255,255,.35);
}

.room-enter-hint {
  position: absolute;
  bottom: 32px; right: 36px;
  font-family: var(--font-mono);
  font-size: 9px; letter-spacing: .2em;
  color: rgba(var(--rr),var(--rg),var(--rb),.0);
  transition: color .3s, transform .3s var(--ease);
  transform: translateX(-8px);
}
.room-cell:hover .room-enter-hint {
  color: rgba(var(--rr),var(--rg),var(--rb),.6);
  transform: translateX(0);
}

/* Room accent line — appears on hover */
.room-accent {
  position: absolute;
  bottom: 0; left: 0;
  height: 2px;
  width: 0;
  background: rgba(var(--rr),var(--rg),var(--rb),.6);
  transition: width .5s var(--ease);
}
.room-cell:hover .room-accent { width: 100%; }

/* ══ WORK VIEW (cards) ══════════════════════════════════ */
#pf-work {
  display: flex;
  flex-direction: column;
}

#pf-work-header {
  position: absolute;
  top: 0; left: 80px; right: 0;
  padding: 22px 40px;
  z-index: 20;
  display: flex;
  align-items: center;
  gap: 24px;
  pointer-events: auto;
}

.pwh-back {
  all: unset;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: var(--font-mono);
  font-size: 8px; letter-spacing: .32em; text-transform: uppercase;
  color: var(--dim);
  transition: color .25s;
}
.pwh-back:hover { color: var(--text); }
.pwh-back-line { width: 20px; height: 1px; background: currentColor; transition: width .3s var(--ease); }
.pwh-back:hover .pwh-back-line { width: 32px; }

.pwh-divider {
  width: 1px; height: 14px;
  background: rgba(255,255,255,.1);
}

#pwh-room-label {
  font-family: var(--font-mono);
  font-size: 8px; letter-spacing: .35em; text-transform: uppercase;
  color: rgba(255,255,255,.2);
}

#pf-cards-stage {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  perspective: 1200px;
  perspective-origin: 50% 50%;
}

#pf-cards-row {
  display: flex;
  align-items: center;
  gap: 0;
  position: relative;
}

/* ── INDIVIDUAL CARD ── */
.pf-card {
  position: relative;
  flex-shrink: 0;
  width: 300px;
  height: 200px;
  cursor: pointer;
  transition:
    transform .55s var(--ease),
    opacity .45s ease,
    z-index 0s;
  transform-style: preserve-3d;
  will-change: transform;
  margin: 0 -20px; /* overlap slightly */
}

.pf-card-inner {
  position: absolute; inset: 0;
  border: 1px solid rgba(255,255,255,.05);
  overflow: hidden;
  transition: border-color .4s;
}
.pf-card:hover .pf-card-inner {
  border-color: rgba(var(--cr),var(--cg),var(--cb),.35);
}

.pf-card-field {
  position: absolute; inset: 0;
  transition: opacity .4s;
}

.pf-card-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(
    to top,
    rgba(6,6,8,0.96) 0%,
    rgba(6,6,8,0.7)  35%,
    rgba(6,6,8,0.2)  65%,
    transparent      100%
  );
}

.pf-card-num {
  position: absolute;
  top: 14px; left: 18px;
  font-family: var(--font-mono);
  font-size: 9px; letter-spacing: .2em;
  color: rgba(255,255,255,.2);
  transition: color .3s;
}
.pf-card:hover .pf-card-num {
  color: rgba(var(--cr),var(--cg),var(--cb),.8);
}

.pf-card-bottom {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  padding: 16px 18px;
}
.pf-card-title {
  font-family: var(--font-body);
  font-size: 18px; font-weight: 300;
  color: rgba(255,255,255,.75);
  line-height: 1.2;
  margin-bottom: 4px;
  transition: color .3s;
}
.pf-card:hover .pf-card-title { color: rgba(255,255,255,.95); }

.pf-card-sub {
  font-family: var(--font-mono);
  font-size: 8px; letter-spacing: .15em; text-transform: uppercase;
  color: rgba(255,255,255,.22);
  transition: color .3s;
}
.pf-card:hover .pf-card-sub {
  color: rgba(var(--cr),var(--cg),var(--cb),.7);
}

/* Tier badge */
.pf-card-tier {
  position: absolute;
  top: 14px; right: 18px;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: rgba(var(--cr),var(--cg),var(--cb),.0);
  transition: background .4s;
}
.pf-card:hover .pf-card-tier {
  background: rgba(var(--cr),var(--cg),var(--cb),.7);
}
.pf-card.tier-1 .pf-card-tier {
  background: rgba(var(--cr),var(--cg),var(--cb),.35);
}

/* Card slot transforms — set by JS based on position relative to hovered */
.pf-card[data-slot="active"] {
  transform: translateX(0) rotateY(0deg) scale(1.05);
  opacity: 1;
  z-index: 10;
}
.pf-card[data-slot="adj-l"] {
  transform: translateX(-8px) rotateY(12deg) scale(0.90);
  opacity: 0.75;
  z-index: 5;
}
.pf-card[data-slot="adj-r"] {
  transform: translateX(8px) rotateY(-12deg) scale(0.90);
  opacity: 0.75;
  z-index: 5;
}
.pf-card[data-slot="far-l"] {
  transform: translateX(-12px) rotateY(22deg) scale(0.78);
  opacity: 0.45;
  z-index: 3;
}
.pf-card[data-slot="far-r"] {
  transform: translateX(12px) rotateY(-22deg) scale(0.78);
  opacity: 0.45;
  z-index: 3;
}
.pf-card[data-slot="hidden"] {
  transform: rotateY(32deg) scale(0.6);
  opacity: 0.12;
  z-index: 1;
}

/* Keyboard navigation hint */
#cards-nav-hint {
  position: absolute;
  bottom: 36px;
  left: 50%;
  transform: translateX(-50%);
  font-family: var(--font-mono);
  font-size: 8px; letter-spacing: .3em; text-transform: uppercase;
  color: rgba(255,255,255,.12);
  display: flex; gap: 16px; align-items: center;
  pointer-events: none;
}
.cnh-key {
  display: inline-flex; align-items: center; justify-content: center;
  width: 20px; height: 20px;
  border: 1px solid rgba(255,255,255,.12);
  font-size: 10px; letter-spacing: 0;
}

/* Card counter */
#cards-counter {
  position: absolute;
  bottom: 36px;
  right: 40px;
  font-family: var(--font-mono);
  font-size: 9px; letter-spacing: .2em;
  color: rgba(255,255,255,.15);
}

/* ══ CASE STUDY OVERLAY ════════════════════════════════ */
#pf-case {
  position: fixed; inset: 0;
  z-index: 200;
  background: var(--bg);
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: rgba(255,255,255,.06) transparent;
  transform: translateY(100%);
  transition: transform 540ms var(--ease);
}
#pf-case.open { transform: translateY(0); }

#cs-nav {
  position: sticky; top: 0; z-index: 10;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 56px;
  height: 60px;
  background: rgba(6,6,8,0.94);
  backdrop-filter: blur(14px);
  border-bottom: 1px solid var(--border);
}

.cs-back {
  all: unset; cursor: pointer;
  display: flex; align-items: center; gap: 10px;
  font-family: var(--font-mono); font-size: 8px;
  letter-spacing: .3em; text-transform: uppercase;
  color: var(--dim); transition: color .2s;
}
.cs-back:hover { color: var(--text); }
.cs-back-line { width: 20px; height: 1px; background: currentColor; transition: width .3s var(--ease); }
.cs-back:hover .cs-back-line { width: 32px; }
.cs-nav-info { font-family: var(--font-mono); font-size: 8px; letter-spacing: .25em; text-transform: uppercase; color: rgba(255,255,255,.15); }

#cs-content {
  max-width: 880px;
  margin: 0 auto;
  padding: 72px 56px 120px;
}

.cs-hero {
  width: 100%; aspect-ratio: 16/9;
  margin-bottom: 60px;
  overflow: hidden; position: relative;
}

.cs-header { margin-bottom: 44px; }
.cs-eyebrow {
  font-family: var(--font-mono); font-size: 9px;
  letter-spacing: .35em; text-transform: uppercase;
  color: rgba(var(--case-r),var(--case-g),var(--case-b),.7);
  margin-bottom: 14px;
}
.cs-title {
  font-family: var(--font-body);
  font-size: clamp(42px, 5.5vw, 76px);
  font-weight: 300; line-height: 1.05; letter-spacing: -.01em;
  margin-bottom: 18px;
}
.cs-tagline {
  font-family: var(--font-body); font-style: italic;
  font-size: 22px; font-weight: 300;
  color: var(--dim); line-height: 1.55;
}

.cs-meta {
  display: flex; gap: 40px; flex-wrap: wrap;
  padding: 26px 0;
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  margin-bottom: 60px;
}
.cs-meta-label {
  font-family: var(--font-mono); font-size: 7px;
  letter-spacing: .3em; text-transform: uppercase;
  color: rgba(255,255,255,.18); margin-bottom: 6px;
}
.cs-meta-val {
  font-family: var(--font-mono); font-size: 10px;
  color: rgba(255,255,255,.55); letter-spacing: .06em;
}

.cs-block { margin-bottom: 60px; }
.cs-text p {
  font-family: var(--font-body); font-size: 20px;
  font-weight: 300; line-height: 1.8;
  color: rgba(255,255,255,.72); margin-bottom: 1.3em;
}
.cs-text p:last-child { margin-bottom: 0; }

.cs-quote {
  padding: 28px 0 28px 26px;
  border-left: 2px solid rgba(var(--case-r),var(--case-g),var(--case-b),.4);
}
.cs-quote blockquote {
  font-family: var(--font-body); font-style: italic;
  font-size: 26px; font-weight: 300;
  line-height: 1.5; color: rgba(255,255,255,.78);
}

.cs-block-img {
  width: 100%; aspect-ratio: 16/9;
  position: relative; overflow: hidden;
}

.cs-pagination {
  display: flex; justify-content: space-between;
  padding-top: 60px; border-top: 1px solid var(--border);
}
.cs-pg-btn {
  all: unset; cursor: pointer;
  display: flex; flex-direction: column; gap: 6px;
}
.cs-pg-lbl {
  font-family: var(--font-mono); font-size: 8px;
  letter-spacing: .3em; text-transform: uppercase;
  color: rgba(255,255,255,.18);
}
.cs-pg-title {
  font-family: var(--font-body); font-size: 20px;
  font-weight: 300; color: rgba(255,255,255,.4);
  transition: color .2s;
}
.cs-pg-btn:hover .cs-pg-title { color: rgba(255,255,255,.88); }
.cs-pg-btn.next { text-align: right; }
</style>
</head>

// ── STATE ──────────────────────────────────────────────────────
let view = 'rooms'; // 'rooms' | 'work' | 'case'
let activeRoom = null;
let roomProjects = [];
let cardIdx = 0;
let caseOpen = false;

// ── BACKGROUND PARTICLES ────────────────────────────────────
(function initBg() {
  const bg = document.getElementById('pf-bg');
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div');
    s.className = 'bg-star';
    const sz = Math.random() * 1.5 + 0.5;
    const op0 = (Math.random() * 0.12 + 0.04).toFixed(3);
    const op1 = (parseFloat(op0) * 2.2).toFixed(3);
    const dur = Math.random() * 25 + 18;
    const dy = (Math.random() * -40 - 10) + 'px';
    const dx = ((Math.random() - 0.5) * 30) + 'px';
    s.style.cssText = `
      width:${sz}px; height:${sz}px;
      left:${Math.random()*100}%; top:${Math.random()*100}%;
      --op0:${op0}; --op1:${op1};
      --dy:${dy}; --dx:${dx};
      animation-duration:${dur}s;
      animation-delay:${-Math.random()*dur}s;
    `;
    bg.appendChild(s);
  }
})();

// ── BUILD ROOMS ────────────────────────────────────────────────
function buildRooms() {
  const grid = document.getElementById('rooms-grid');
  grid.innerHTML = '';
  ROOMS.forEach((room, i) => {
    const count = PROJECTS.filter(p => p.room === room.id).length;
    const cell = document.createElement('div');
    cell.className = 'room-cell';
    cell.style.cssText = `--rr:${room.r};--rg:${room.g};--rb:${room.b}`;
    cell.innerHTML = `
      <div class="room-bg-num">${room.bgNum}</div>
      <div class="room-tag">${room.tag}</div>
      <div class="room-name">${room.name}</div>
      <div class="room-count">${count} ${count === 1 ? 'proyecto' : 'proyectos'}</div>
      <div class="room-enter-hint">entrar →</div>
      <div class="room-accent"></div>
    `;
    cell.addEventListener('click', () => enterRoom(room.id));
    grid.appendChild(cell);
    // Staggered entrance
    setTimeout(() => cell.classList.add('entered'), 80 + i * 120);
  });
}

// ── ROOMS ↔ WORK TRANSITIONS ────────────────────────────────
function enterRoom(roomId) {
  const room = ROOMS.find(r => r.id === roomId);
  activeRoom = room;
  roomProjects = PROJECTS.filter(p => p.room === roomId);
  cardIdx = 0;

  // Animate rooms out
  const cells = document.querySelectorAll('.room-cell');
  cells.forEach((c, i) => {
    c.style.transition = `opacity .35s ease ${i*40}ms, transform .35s ease ${i*40}ms`;
    c.style.opacity = '0';
    c.style.transform = 'translateY(-16px)';
  });

  setTimeout(() => {
    document.getElementById('pf-rooms').classList.add('hidden');
    document.getElementById('pf-rooms').style.opacity = '0';
    switchToWork(room);
  }, 280);
}

function switchToWork(room) {
  const workView = document.getElementById('pf-work');
  workView.classList.remove('hidden');
  workView.style.opacity = '0';

  document.getElementById('pwh-room-label').textContent = room.name;

  buildCards();

  requestAnimationFrame(() => {
    workView.style.transition = 'opacity .5s ease';
    workView.style.opacity = '1';
  });
  view = 'work';
  updateHint();
  updateBackNav();
}

function goToRooms() {
  const workView = document.getElementById('pf-work');
  workView.style.transition = 'opacity .35s ease';
  workView.style.opacity = '0';

  setTimeout(() => {
    workView.classList.add('hidden');
    const roomsView = document.getElementById('pf-rooms');
    roomsView.style.opacity = '0';
    roomsView.classList.remove('hidden');

    // Reset room cells
    const cells = document.querySelectorAll('.room-cell');
    cells.forEach(c => {
      c.style.transition = '';
      c.style.opacity = '';
      c.style.transform = '';
    });

    requestAnimationFrame(() => {
      roomsView.style.transition = 'opacity .4s ease';
      roomsView.style.opacity = '1';
    });
    view = 'rooms';
    updateBackNav();
  }, 300);
}

// ── BUILD CARDS ────────────────────────────────────────────────
function buildCards() {
  const row = document.getElementById('pf-cards-row');
  row.innerHTML = '';

  roomProjects.forEach((p, i) => {
    const card = document.createElement('div');
    card.className = `pf-card tier-${p.tier}`;
    card.dataset.idx = i;
    card.style.cssText = `--cr:${p.r};--cg:${p.g};--cb:${p.b}`;

    card.innerHTML = `
      <div class="pf-card-inner">
        <div class="pf-card-field" style="background:${p.grad}"></div>
        <div class="pf-card-overlay"></div>
        <div class="pf-card-num">${p.num}</div>
        <div class="pf-card-tier"></div>
        <div class="pf-card-bottom">
          <div class="pf-card-title">${p.title}</div>
          <div class="pf-card-sub">${p.client} · ${p.year}</div>
        </div>
      </div>
    `;

    card.addEventListener('click', () => {
      if (parseInt(card.dataset.slot_idx) === cardIdx) {
        openCase(i);
      } else {
        cardIdx = i;
        updateCardSlots();
      }
    });

    row.appendChild(card);
  });

  updateCardSlots(true);
  updateCounter();
}

function updateCardSlots(instant) {
  const cards = document.querySelectorAll('.pf-card');
  const n = roomProjects.length;

  cards.forEach((card, i) => {
    const rel = i - cardIdx;
    let slot;
    if (rel === 0) slot = 'active';
    else if (rel === -1) slot = 'adj-l';
    else if (rel === 1) slot = 'adj-r';
    else if (rel === -2) slot = 'far-l';
    else if (rel === 2) slot = 'far-r';
    else slot = 'hidden';

    card.dataset.slot_idx = i;
    if (instant) {
      card.style.transition = 'none';
      requestAnimationFrame(() => {
        card.setAttribute('data-slot', slot);
        requestAnimationFrame(() => { card.style.transition = ''; });
      });
    } else {
      card.setAttribute('data-slot', slot);
    }
  });

  updateCounter();
}

function updateCounter() {
  document.getElementById('cards-counter').textContent =
    `${String(cardIdx + 1).padStart(2,'0')} / ${String(roomProjects.length).padStart(2,'0')}`;
}

function updateHint() {
  const hint = document.getElementById('cards-nav-hint');
  hint.style.display = roomProjects.length > 1 ? 'flex' : 'none';
}

// ── KEYBOARD NAVIGATION ────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (caseOpen) {
    if (e.key === 'Escape') closeCase();
    return;
  }
  if (view === 'work') {
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
      cardIdx = Math.min(cardIdx + 1, roomProjects.length - 1);
      updateCardSlots();
    } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
      cardIdx = Math.max(cardIdx - 1, 0);
      updateCardSlots();
    } else if (e.key === 'Enter' || e.key === ' ') {
      openCase(cardIdx);
    } else if (e.key === 'Escape') {
      goToRooms();
    }
  } else if (view === 'rooms') {
    if (e.key === 'Escape') goBack();
  }
});

// ── CASE STUDY ─────────────────────────────────────────────────
function openCase(idx) {
  const p = roomProjects[idx];
  caseOpen = true;
  cardIdx = idx;

  document.getElementById('cs-nav').style.setProperty('--case-r', p.r);
  document.getElementById('cs-nav').style.setProperty('--case-g', p.g);
  document.getElementById('cs-nav').style.setProperty('--case-b', p.b);
  document.getElementById('cs-content').style.setProperty('--case-r', p.r);
  document.getElementById('cs-content').style.setProperty('--case-g', p.g);
  document.getElementById('cs-content').style.setProperty('--case-b', p.b);

  document.getElementById('cs-nav-info').textContent = `${p.num} — ${activeRoom.name}`;
  document.getElementById('cs-content').innerHTML = buildCase(p, idx);

  const caseEl = document.getElementById('pf-case');
  caseEl.classList.add('open');
  caseEl.scrollTop = 0;

  // Prev/next
  caseEl.querySelector('.cs-pg-prev')?.addEventListener('click', () => { closeCase(); setTimeout(() => { cardIdx = idx - 1; openCase(cardIdx); }, 80); });
  caseEl.querySelector('.cs-pg-next')?.addEventListener('click', () => { closeCase(); setTimeout(() => { cardIdx = idx + 1; openCase(cardIdx); }, 80); });
}

function closeCase() {
  document.getElementById('pf-case').classList.remove('open');
  caseOpen = false;
}

document.getElementById('cs-back-btn').addEventListener('click', closeCase);

function buildCase(p, idx) {
  const catStr = p.cats.join(' · ');
  let html = `
    <div class="cs-hero">
      <div class="pf-card-field" style="background:${p.grad};position:absolute;inset:0"></div>
    </div>
    <div class="cs-header">
      <div class="cs-eyebrow">${p.client} · ${p.year}</div>
      <div class="cs-title">${p.title}</div>
      <div class="cs-tagline">${p.tagline}</div>
    </div>
    <div class="cs-meta">
      <div><div class="cs-meta-label">Cliente</div><div class="cs-meta-val">${p.client}</div></div>
      <div><div class="cs-meta-label">Año</div><div class="cs-meta-val">${p.year}</div></div>
      <div><div class="cs-meta-label">Disciplinas</div><div class="cs-meta-val">${catStr}</div></div>
    </div>
  `;

  p.blocks.forEach(b => {
    html += `<div class="cs-block">`;
    if (b.type === 'text') {
      html += `<div class="cs-text">`;
      b.body.split('\n\n').forEach(par => { html += `<p>${par}</p>`; });
      html += `</div>`;
    } else if (b.type === 'quote') {
      html += `<div class="cs-quote"><blockquote>${b.text}</blockquote></div>`;
    } else if (b.type === 'image') {
      html += `<div class="cs-block-img" style="background:${p.grad}"></div>`;
    }
    html += `</div>`;
  });

  if (!p.blocks.length) {
    html += `<div class="cs-block cs-text"><p style="color:rgba(255,255,255,.2);font-style:italic">Case study en preparación.</p></div>`;
  }

  // Pagination within room
  const hasPrev = idx > 0;
  const hasNext = idx < roomProjects.length - 1;
  html += `<div class="cs-pagination">`;
  if (hasPrev) {
    const prev = roomProjects[idx - 1];
    html += `<button class="cs-pg-btn cs-pg-prev"><span class="cs-pg-lbl">← anterior</span><span class="cs-pg-title">${prev.title}</span></button>`;
  } else { html += `<div></div>`; }
  if (hasNext) {
    const next = roomProjects[idx + 1];
    html += `<button class="cs-pg-btn cs-pg-next next"><span class="cs-pg-lbl">siguiente →</span><span class="cs-pg-title">${next.title}</span></button>`;
  }
  html += `</div>`;

  return html;
}

// ── BACK NAV — label updates per view ─────────────────────────
function updateBackNav() {
  const label = document.getElementById('pf-back-label');
  const sub   = document.getElementById('pf-back-sub');
  if (view === 'rooms') {
    label.textContent = 'Volver';
    sub.textContent   = 'al mapa';
  } else if (view === 'work') {
    label.textContent = 'Volver';
    sub.textContent   = 'a salas';
  }
}

document.getElementById('pf-back-btn').addEventListener('click', () => {
  if (caseOpen)       { closeCase(); return; }
  if (view === 'work'){ goToRooms(); return; }
  goBack();
});

// ── BACK TO MAIN SITE ──────────────────────────────────────────
function goBack() {
  const fade = document.getElementById('pf-fade');
  fade.style.opacity = '1';
  fade.style.transition = 'opacity .42s ease';
  fade.style.pointerEvents = 'auto';
  setTimeout(() => { window.location.href = '../index.html?back=1'; }, 430);
}

// pwh-back-btn removed — side nav handles room back navigation

// ── INIT ───────────────────────────────────────────────────────
buildRooms();
setTimeout(() => {
  document.getElementById('pf-fade').classList.add('out');
}, 60);
</script>
