<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Work — Nifdel Rivera</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../nav.css">
<script>
window.addEventListener('pageshow',function(e){if(e.persisted)window.location.reload();});
// Error visible — ayuda a diagnosticar fallos de módulo
window.addEventListener('error',function(e){
  var d=document.createElement('div');
  d.style.cssText='position:fixed;top:0;left:0;right:0;padding:8px;background:red;color:#fff;z-index:99999;font:11px monospace;white-space:pre-wrap';
  d.textContent='ERROR: '+e.message+'\n'+e.filename+':'+e.lineno;
  document.body&&document.body.appendChild(d);
},true);
window.addEventListener('unhandledrejection',function(e){
  var d=document.createElement('div');
  d.style.cssText='position:fixed;top:0;left:0;right:0;padding:8px;background:orange;color:#000;z-index:99999;font:11px monospace;white-space:pre-wrap';
  d.textContent='MODULE FAIL: '+String(e.reason);
  document.body&&document.body.appendChild(d);
});
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<style>
/* ── RESET ───────────────────────────────────────────────────────────── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; cursor: none !important; user-select: none; -webkit-user-select: none; }
html, body { width: 100vw; height: 100vh; overflow: hidden; background: #020408; color: #fff; -webkit-font-smoothing: antialiased; }

/* ── CANVAS ──────────────────────────────────────────────────────────── */
#c { position: fixed; inset: 0; display: block; }

/* ── CURSOR ──────────────────────────────────────────────────────────── */
#cur   { position: fixed; width: 6px; height: 6px; background: #fff; border-radius: 50%; pointer-events: none; z-index: 9999; transform: translate(-50%,-50%); }
#cur-r { position: fixed; width: 28px; height: 28px; border: 1px solid rgba(255,255,255,.22); border-radius: 50%; pointer-events: none; z-index: 9998; transform: translate(-50%,-50%); transition: width .35s cubic-bezier(.25,.46,.45,.94), height .35s, border-color .35s; }
#cur-r.on { width: 50px; height: 50px; border-color: rgba(107,159,255,.65); }

/* ── PAGE FADE ───────────────────────────────────────────────────────── */
#pf-fade { position: fixed; inset: 0; background: #020408; z-index: 9000; pointer-events: none;
  animation: pfReveal 500ms ease 80ms forwards; }
@keyframes pfReveal { from { opacity: 1; } to { opacity: 0; pointer-events: none; } }
/* JS puede forzar opaco para salidas */
#pf-fade.opaque { animation: none; opacity: 1; }

/* nav.css handles top-nav + side-nav */
/* work-specific side-nav override — margin system + slightly wider */
#side-nav { left:47px; width:62px; }

/* ── CINEMATIC NAV — spacecraft targeting HUD ────────────────────────── */
#cin-nav {
  position: fixed; bottom: 47px; left: 50%; transform: translateX(-50%);
  z-index: 200; pointer-events: all;
  opacity: 0; transition: opacity .7s ease;
  width: min(800px, calc(100vw - 240px));
}
#cin-nav.vis { opacity: 1; }
#cin-nav::before { content: none; }

/* ── Glass card ── */
.cnav-card {
  background: rgba(6,10,22,.52);
  backdrop-filter: blur(48px) saturate(1.6); -webkit-backdrop-filter: blur(48px) saturate(1.6);
  border: none;
  border-radius: 18px;
  box-shadow: none;
  padding: 16px 24px 18px;
  display: flex; flex-direction: column; gap: 0;
}

/* ── Strip superior ── */
.cnav-strip {
  display: flex; align-items: center; gap: 14px;
  padding-bottom: 13px;
  border-bottom: 1px solid rgba(255,255,255,.06);
  margin-bottom: 15px;
}
.cnav-strip-left { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.cnav-strip-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: rgba(107,159,255,.75);
  box-shadow: 0 0 5px rgba(107,159,255,.5);
  animation: dotPulse 2.4s ease-in-out infinite;
  flex-shrink: 0;
}
.cnav-strip-lbl {
  font-family: 'Space Mono', monospace;
  font-size: 7px; letter-spacing: .5em;
  color: rgba(255,255,255,.20);
  white-space: nowrap;
}
/* Separador vertical en la strip */
.cnav-strip-sep {
  width: 1px; height: 12px; flex-shrink: 0;
  background: rgba(255,255,255,.10);
}
.cnav-strip-num {
  font-family: 'Space Mono', monospace;
  font-size: 9px; letter-spacing: .28em;
  color: rgba(255,255,255,.28);
  flex-shrink: 0; white-space: nowrap;
}
.cnav-strip-cat {
  font-family: 'Space Mono', monospace;
  font-size: 8px; letter-spacing: .20em;
  color: rgba(255,255,255,.18);
  text-align: right;
  flex: 1; min-width: 0;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}

/* ── Fila principal ── */
.cnav-main {
  display: flex; align-items: center; justify-content: space-between;
  gap: 20px; margin-bottom: 15px;
}

/* ── Centro: símbolo + título ── */
.cnav-center {
  flex: 1;
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  min-width: 0;
}
.cnav-symbol {
  font-size: 10px; color: rgba(107,159,255,.30);
  animation: targetPulse 3.2s ease-in-out infinite;
  line-height: 1; flex-shrink: 0;
}
.cnav-title {
  font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800;
  letter-spacing: .32em; text-transform: uppercase;
  color: rgba(255,255,255,.80); text-align: center;
  max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  transition: opacity .22s ease;
}

/* ── Track de posición ── */
.cnav-track {
  position: relative;
  height: 2px;
  background: rgba(255,255,255,.06);
  border-radius: 2px;
  overflow: visible;
}
.cnav-track-fill {
  position: absolute; left: 0; top: 0; bottom: 0;
  background: rgba(107,159,255,.35);
  border-radius: 2px;
  transition: width .5s cubic-bezier(.25,.46,.45,.94);
}
.cnav-track-thumb {
  position: absolute; top: 50%; transform: translate(-50%,-50%);
  width: 6px; height: 6px; border-radius: 50%;
  background: rgba(107,159,255,.85);
  box-shadow: 0 0 6px rgba(107,159,255,.6);
  transition: left .5s cubic-bezier(.25,.46,.45,.94);
}

/* ── Info central — targeting ── */
@keyframes targetPulse {
  0%, 100% { opacity: .28; }
  50%       { opacity: .60; }
}

/* Botones */
.cn-btn {
  position: relative;
  width: 72px; height: 72px;
  border: 1px solid rgba(255,255,255,.18);
  background: transparent;
  backdrop-filter: none;
  box-shadow: none;
  color: rgba(255,255,255,.50); font-size: 20px;
  display: flex; align-items: center; justify-content: center;
  transition: border-color .35s cubic-bezier(.25,.46,.45,.94),
              color .35s cubic-bezier(.25,.46,.45,.94);
  font-family: 'Space Mono', monospace;
  border-radius: 50%;
}

/* ── Estados ocultos — posición de reposo antes/después de la animación ── */
#cn-prev.cn-hidden { opacity: 0; pointer-events: none; transform: translateX(-18px) scale(0.78); }
#cn-next.cn-hidden { opacity: 0; pointer-events: none; transform: translateX( 18px) scale(0.78); }

/* ── Entrada — spring con ligero overshoot, sale desde el borde hacia centro ── */
@keyframes cnEnterLeft {
  0%   { opacity: 0; transform: translateX(-18px) scale(0.78); }
  55%  { opacity: 1; transform: translateX(3px)   scale(1.06); }
  78%  { transform: translateX(-1px) scale(0.98); }
  100% { opacity: 1; transform: translateX(0)     scale(1.00); }
}
@keyframes cnEnterRight {
  0%   { opacity: 0; transform: translateX( 18px) scale(0.78); }
  55%  { opacity: 1; transform: translateX(-3px)  scale(1.06); }
  78%  { transform: translateX(1px) scale(0.98); }
  100% { opacity: 1; transform: translateX(0)     scale(1.00); }
}

/* ── Salida — rápida, se retrae hacia su borde ── */
@keyframes cnExitLeft {
  0%   { opacity: 1; transform: translateX(0)     scale(1.00); }
  30%  { opacity: 1; transform: translateX(3px)   scale(1.03); } /* micro anticipación */
  100% { opacity: 0; transform: translateX(-18px) scale(0.78); }
}
@keyframes cnExitRight {
  0%   { opacity: 1; transform: translateX(0)     scale(1.00); }
  30%  { opacity: 1; transform: translateX(-3px)  scale(1.03); }
  100% { opacity: 0; transform: translateX( 18px) scale(0.78); }
}

#cn-prev.cn-entering { animation: cnEnterLeft  0.50s cubic-bezier(.34,1.56,.64,1) forwards; }
#cn-next.cn-entering { animation: cnEnterRight 0.50s cubic-bezier(.34,1.56,.64,1) forwards; }
#cn-prev.cn-exiting  { animation: cnExitLeft   0.28s cubic-bezier(.55,0,1,.45)    forwards; }
#cn-next.cn-exiting  { animation: cnExitRight  0.28s cubic-bezier(.55,0,1,.45)    forwards; }
/* Sin corner marks — los botones son circulares */
.cn-btn::before, .cn-btn::after { content: none; }

.cn-arr {
  display: inline-block;
  transition: transform .38s cubic-bezier(.34,1.56,.64,1);
}
.cn-btn:hover {
  border-color: rgba(255,255,255,.55);
  color: rgba(255,255,255,.95);
}
#cn-prev:hover .cn-arr { transform: translateX(-5px); }
#cn-next:hover .cn-arr { transform: translateX(5px); }
.cn-btn:active { transform: scale(0.95); }

/* Pulso idle — sutil respiración en el símbolo targeting */
@keyframes targetPulse {
  0%, 100% { opacity: .28; }
  50%       { opacity: .55; }
}

/* ── NAV HINTS — HUD panel esquina inferior izquierda ────────────────── */
#nav-hints {
  position: fixed; bottom: 47px; left: 47px;
  z-index: 200; pointer-events: none;
  width: 275px;
  padding: 22px 26px 26px;
  background: rgba(6,10,22,.38);
  backdrop-filter: blur(30px) saturate(1.2); -webkit-backdrop-filter: blur(30px) saturate(1.2);
  border: 1px solid rgba(255,255,255,.11);
  border-radius: 16px;
  box-shadow: inset 0 1px 0 rgba(255,255,255,.08), 0 8px 32px rgba(0,0,0,.32);
  /* Grid sutil — textura de nave */
  background-image:
    linear-gradient(rgba(107,159,255,.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(107,159,255,.03) 1px, transparent 1px),
    linear-gradient(rgba(6,10,22,.38), rgba(6,10,22,.38));
  background-size: 35px 35px, 35px 35px, 100% 100%;
  opacity: 0; transition: opacity .7s ease;
}
#nav-hints.vis { opacity: 1; }

/* Sin corner marks — el border-radius define la forma */
#nav-hints::before, #nav-hints::after { content: none; }

/* Back button — mismo patrón que info/index.html */
.nh-back {
  display: inline-flex; align-items: center; gap: 19px;
  font-family: 'Space Mono', monospace;
  font-size: 14px; letter-spacing: .28em; text-transform: uppercase;
  color: rgba(255,255,255,.35);
  border: 1px solid rgba(255,255,255,.10);
  padding: 16px 32px;
  background: rgba(2,4,8,.65);
  text-decoration: none;
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  transition: color .3s, border-color .3s, gap .3s, letter-spacing .3s;
  pointer-events: all; margin-bottom: 22px;
  width: 100%;
}
.nh-back::before { content: '←'; transition: transform .3s; }
.nh-back:hover {
  color: rgba(255,255,255,.85);
  border-color: rgba(255,255,255,.28);
  gap: 26px; letter-spacing: .34em;
}
.nh-back:hover::before { transform: translateX(-4px); }

/* Divisor */
.nh-divider {
  height: 1px; background: rgba(255,255,255,.06);
  margin-bottom: 19px;
}

/* Label de sistema */
.nh-label {
  font-size: 13px; letter-spacing: .45em;
  color: rgba(107,159,255,.35); font-family: 'Space Mono', monospace;
  margin-bottom: 19px; display: block;
}

.nh-item {
  display: flex; align-items: center; justify-content: space-between;
  gap: 16px; margin-bottom: 14px;
}
.nh-item:last-child { margin-bottom: 0; }

.nh-action {
  font-size: 14px; letter-spacing: .18em;
  color: rgba(255,255,255,.22); font-family: 'Space Mono', monospace;
  flex: 1;
}
.nh-key {
  font-size: 14px; letter-spacing: .06em;
  color: rgba(255,255,255,.38);
  border: 1px solid rgba(255,255,255,.12);
  padding: 5px 13px;
  background: rgba(255,255,255,.03);
  line-height: 1.4; white-space: nowrap;
  font-family: 'Space Mono', monospace;
}

/* ── PROGRESS BAR ────────────────────────────────────────────────────── */
#prog { position: fixed; bottom: 0; left: 0; height: 1px; background: rgba(107,159,255,.45); z-index: 300; transition: width .5s cubic-bezier(.25,.46,.45,.94); }

/* ── DOMAIN LABEL ────────────────────────────────────────────────────── */
#domain-label {
  position: fixed; top: 18px; left: 100px;
  z-index: 200;
  font-family: 'Syne', sans-serif; font-size: 64px; font-weight: 800;
  letter-spacing: -.02em; color: rgba(255,255,255,.10);
  pointer-events: none; line-height: 1;
}

/* ── RIGHT PANEL ─────────────────────────────────────────────────────── */
#panel {
  position: fixed; right: 47px; bottom: 47px;
  width: 380px;
  max-height: calc(100vh - 94px);
  z-index: 100;
  background: rgba(6,10,22,.72);
  backdrop-filter: blur(52px) saturate(1.45); -webkit-backdrop-filter: blur(52px) saturate(1.45);
  border: none;
  border-radius: 20px;
  box-shadow: 0 8px 48px rgba(0,0,0,.55);
  transform: translateX(calc(100% + 16px));
  transition: transform .65s cubic-bezier(.25,.46,.45,.94), opacity .65s;
  pointer-events: none; opacity: 0;
  display: flex; flex-direction: column;
  overflow: hidden;
}
#panel.vis { transform: translateX(0); pointer-events: all; opacity: 1; }

/* ── Dividers — full-bleed dentro del panel ── */
.pd-rule {
  height: 1px; flex-shrink: 0;
  background: linear-gradient(to right, rgba(255,255,255,.10) 0%, rgba(255,255,255,.03) 100%);
}

/* ── BLOCK 1 · MISSION HEADER ── */
.pd-b1 { padding: 22px 26px 20px; flex-shrink: 0; }
.pd-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px;
}
.pd-header-left { display: flex; align-items: center; gap: 8px; }
.pd-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: rgba(107,159,255,.8);
  box-shadow: 0 0 6px rgba(107,159,255,.6);
  animation: dotPulse 2.4s ease-in-out infinite;
  flex-shrink: 0;
}
@keyframes dotPulse {
  0%,100% { opacity: .6; transform: scale(1); }
  50%      { opacity: 1;  transform: scale(1.35); }
}
.pd-status-lbl {
  font-family: 'Space Mono', monospace;
  font-size: 10px; letter-spacing: .45em;
  color: rgba(255,255,255,.22);
}
.pd-counter {
  font-family: 'Space Mono', monospace;
  font-size: 11px; letter-spacing: .25em;
  color: rgba(255,255,255,.18);
}
.pd-title {
  font-family: 'Syne', sans-serif; font-size: 30px; font-weight: 800;
  color: rgba(255,255,255,.92); line-height: 1.1;
  letter-spacing: -.025em; margin-bottom: 7px;
  overflow-wrap: break-word; word-break: break-word;
}
.pd-client {
  font-family: 'Space Mono', monospace;
  font-size: 11px; letter-spacing: .28em;
}

/* ── BLOCK 2 · DATA MATRIX ── */
.pd-b2 { padding: 18px 26px; flex-shrink: 0; }
.pd-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px 12px; }
.pd-cell { display: flex; flex-direction: column; gap: 4px; }
.pd-cell-lbl {
  font-family: 'Space Mono', monospace;
  font-size: 9px; letter-spacing: .45em;
  color: rgba(255,255,255,.22); text-transform: uppercase;
}
.pd-cell-val {
  font-family: 'Space Mono', monospace;
  font-size: 12px; letter-spacing: .08em;
  color: rgba(255,255,255,.68); line-height: 1.4;
}

/* ── BLOCK 3 · BRIEF ── */
.pd-b3 {
  padding: 18px 26px;
  overflow-y: auto;
  scrollbar-width: none;
}
.pd-b3::-webkit-scrollbar { display: none; }
.pd-section-lbl {
  font-family: 'Space Mono', monospace;
  font-size: 9px; letter-spacing: .5em;
  color: rgba(255,255,255,.20); margin-bottom: 10px;
}
.pd-desc {
  font-family: 'Space Mono', monospace;
  font-size: 12px; line-height: 1.85;
  color: rgba(255,255,255,.38);
}
.pd-stats { display: flex; flex-direction: column; margin-top: 14px; }
.pd-stat-row {
  display: flex; align-items: baseline; justify-content: space-between;
  padding: 7px 0; border-bottom: 1px solid rgba(255,255,255,.04);
}
.pd-stat-row:last-child { border-bottom: none; }
.pd-stat-lbl {
  font-family: 'Space Mono', monospace;
  font-size: 10px; letter-spacing: .3em; color: rgba(255,255,255,.22);
}
.pd-stat-val {
  font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700;
  color: rgba(255,255,255,.65);
}
.pd-awards { display: flex; flex-direction: column; gap: 6px; margin-top: 14px; }
.pd-award {
  display: flex; align-items: center; gap: 9px;
  font-family: 'Space Mono', monospace;
  font-size: 11px; letter-spacing: .12em; color: rgba(255,255,255,.40);
}
.pd-award-icon { color: rgba(107,159,255,.65); font-size: 12px; flex-shrink: 0; }

/* ── BLOCK 4 · MISSION CONTROLS ── */
.pd-b4 { padding: 18px 26px 22px; flex-shrink: 0; }

/* Mini nav row */
.pd-ctrl-nav {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 14px;
}
.pd-ctrl-btn {
  width: 34px; height: 34px; border-radius: 50%;
  border: 1px solid rgba(255,255,255,.10);
  background: rgba(8,12,26,.35);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  color: rgba(255,255,255,.38); font-size: 13px;
  font-family: 'Space Mono', monospace;
  display: flex; align-items: center; justify-content: center;
  transition: border-color .28s, color .28s, background .28s,
              opacity .28s, transform .28s;
  cursor: none;
}
.pd-ctrl-btn:hover {
  border-color: rgba(255,255,255,.28); color: rgba(255,255,255,.85);
  background: rgba(107,159,255,.08);
}
.pd-ctrl-btn:active { transform: scale(0.93); }
.pd-ctrl-btn.pd-btn-dis { opacity: 0; pointer-events: none; }
.pd-ctrl-num {
  font-family: 'Space Mono', monospace;
  font-size: 12px; letter-spacing: .32em; color: rgba(255,255,255,.28);
}

/* CTA stack */
.pd-ctas { display: flex; flex-direction: column; gap: 8px; }

/* Primary — Iniciar Misión */
.pd-cta {
  display: flex; align-items: center; justify-content: space-between;
  text-decoration: none; padding: 13px 16px;
  background: rgba(107,159,255,.06);
  border: 1px solid rgba(107,159,255,.18);
  border-radius: 10px;
  transition: background .25s, border-color .25s;
  cursor: none;
}
.pd-cta span:first-child {
  font-family: 'Space Mono', monospace;
  font-size: 11px; letter-spacing: .35em; color: rgba(107,159,255,.80);
}
.pd-cta-arrow { color: rgba(107,159,255,.55); font-size: 16px; transition: transform .25s; }
.pd-cta:hover { background: rgba(107,159,255,.12); border-color: rgba(107,159,255,.38); }
.pd-cta:hover .pd-cta-arrow { transform: translateX(4px); }

/* Secondary external links — Behance / Web */
.pd-cta-ext {
  display: flex; align-items: center; justify-content: space-between;
  text-decoration: none; padding: 11px 16px;
  background: rgba(255,255,255,.02);
  border: 1px solid rgba(255,255,255,.07);
  border-radius: 10px;
  transition: background .25s, border-color .25s;
  cursor: none;
}
.pd-cta-ext .pd-ext-lbl {
  font-family: 'Space Mono', monospace;
  font-size: 10px; letter-spacing: .30em; color: rgba(255,255,255,.30);
}
.pd-cta-ext .pd-ext-icon { color: rgba(255,255,255,.18); font-size: 13px; transition: transform .25s; }
.pd-cta-ext:hover { background: rgba(255,255,255,.05); border-color: rgba(255,255,255,.16); }
.pd-cta-ext:hover .pd-ext-icon { transform: translate(2px, -2px); }


/* ── ZOOM OVERLAY ────────────────────────────────────────────────────── */
#zblur { position: fixed; inset: 0; z-index: 400; pointer-events: none; opacity: 0; background: #000; }
</style>
</head>
<body>

<canvas id="c"></canvas>

<div id="cur"></div>
<div id="cur-r"></div>
<script>
// Cursor independiente del módulo — siempre funciona
(function(){
  var cur=document.getElementById('cur'),curR=document.getElementById('cur-r'),rx=0,ry=0;
  document.addEventListener('mousemove',function(e){
    cur.style.left=e.clientX+'px'; cur.style.top=e.clientY+'px';
  });
  (function lc(){rx+=(parseFloat(cur.style.left||0)-rx)*0.12;ry+=(parseFloat(cur.style.top||0)-ry)*0.12;
    curR.style.left=rx+'px';curR.style.top=ry+'px';requestAnimationFrame(lc);})();
})();
</script>
<div id="prog"></div>
<div id="zblur"></div>
<div id="pf-fade"></div>

<!-- TOP NAV -->
<nav id="top-nav" class="nav-on">
  <div class="tn-logo-wrap">
    <img src="../assets/LOGO.svg" alt="Nifdel Rivera" class="tn-logo-img">
  </div>
  <div class="tn-pills">
    <div class="tn-pill" id="pill-identity">
      <span class="tp-name">Nifdel Rivera</span>
      <span class="tp-sep">·</span>
      <span class="tp-role">Creative Technologist</span>
    </div>
    <div class="tn-pill" id="pill-status">
      <span class="tn-dot"></span>
      <span class="tp-state">Work · Portfolio</span>

// ── LAYOUT — [x, y, z, rotY]
// rotY calculado con atan2(camX-cardX, camZ-cardZ) * 0.20
// Cámara ref: (0, 2.8, 10) → cada card mira al espectador con inclinación proporcional
// Ningún card intersecta el planeta (PP -4,-22,-32 radio 18 — separación y=22 > r=18)
const LAYOUT = [
  [  0,   0.8,  -7,   0.00 ],  // centro — face-on perfecto
  [ 13,   0.5, -10,  -0.13 ],  // derecha: atan2(-13,20)*0.20
  [-12,   1.0, -10,   0.12 ],  // izquierda: atan2(12,20)*0.20
  [ 20,   0.3, -14,  -0.16 ],  // derecha lejana: atan2(-20,24)*0.20
  [-18,   1.2, -14,   0.15 ],  // izquierda lejana: atan2(18,24)*0.20
  [  6,   0.6, -17,  -0.05 ],  // casi centro: atan2(-6,27)*0.20
  [ -9,   0.9, -19,   0.07 ],  // izquierda leve: atan2(9,29)*0.20
  [ 16,   0.4, -22,  -0.11 ],  // derecha fondo: atan2(-16,32)*0.20
];

// ══════════════════════════════════════════════════════════════════════
//  RENDERER + SCENE
// ══════════════════════════════════════════════════════════════════════
let W = window.innerWidth, H = window.innerHeight;

const canvas   = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: false, alpha: false });
renderer.setSize(W, H);
renderer.setPixelRatio(Math.min(devicePixelRatio, 1.65));
renderer.toneMapping         = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x020408);
scene.fog        = new THREE.FogExp2(0x020408, 0.006);

const camera = new THREE.PerspectiveCamera(55, W / H, 0.1, 300);

// ══════════════════════════════════════════════════════════════════════
//  POST-PROCESSING
// ══════════════════════════════════════════════════════════════════════
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));

const zoomBlurPass = new ShaderPass(ZoomBlurShader);
composer.addPass(zoomBlurPass);

const bloomPass = new UnrealBloomPass(new THREE.Vector2(W, H), 1.5, 0.4, 0.32);
bloomPass.strength = 0.8;
bloomPass.radius   = 0.35;
composer.addPass(bloomPass);

const godRaysPass = new ShaderPass({
  uniforms: {
    tDiffuse:   { value: null },
    uLightPos:  { value: new THREE.Vector2(0.35, 0.5) },
    uIntensity: { value: 0.06 },
    uDecay:     { value: 0.93 },
    uDensity:   { value: 0.96 },
  },
  vertexShader:   GodRaysShader.vertexShader,
  fragmentShader: GodRaysShader.fragmentShader,
});
composer.addPass(godRaysPass);

const eventHorizonPass = new ShaderPass(EventHorizonShader);
eventHorizonPass.uniforms.uAspect.value = W / H;
composer.addPass(eventHorizonPass);

const chromaPass = new ShaderPass(ChromaticAberrationShader);
composer.addPass(chromaPass);

const grainPass = new ShaderPass(GrainShader);
composer.addPass(grainPass);

const vignetteChromaPass = new ShaderPass(VignetteChromaShader);
vignetteChromaPass.uniforms.uAspect.value = W / H;
composer.addPass(vignetteChromaPass);

// ── LENS DISTORTION — POV cinemático: fisheye + aberración cromática radial + vignette ──
const LensShader = {
  uniforms: {
    tDiffuse:   { value: null },
    uStrength:  { value: -0.16 },  // pincushion invertido — centro comprimido, bordes abiertos
    uChroma:    { value: 0.018 },  // split cromático en bordes
    uVignette:  { value: 0.65 },   // caída de vignette
    uAspect:    { value: window.innerWidth / window.innerHeight },
  },
  vertexShader: `
    varying vec2 vUv;
    void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0); }
  `,
  fragmentShader: `
    uniform sampler2D tDiffuse;
    uniform float uStrength;
    uniform float uChroma;
    uniform float uVignette;
    uniform float uAspect;
    varying vec2 vUv;

    // Barrel distortion aspect-corrected: circular en cualquier resolución
    vec2 barrel(vec2 uv, float k) {
      vec2 c  = uv - 0.5;
      c.x    *= uAspect;                      // corregir ratio para que sea circular
      float r2 = dot(c, c);
      c      *= 1.0 + k * r2 + k * 0.4 * r2 * r2;  // k*r² + k*r⁴ — curva suave tipo lente
      c.x    /= uAspect;
      return c + 0.5;
    }

    void main() {
      vec2  uv  = vUv - 0.5;
      uv.x     *= uAspect;
      float r   = length(uv);                 // distancia al centro (aspect-correct)
      uv.x     /= uAspect;

      // Chromatic aberration radial — escala con r² (solo en bordes, como una lente real)
      float ca  = uChroma * r * r;

      // Cada canal samplea a radio ligeramente distinto
      vec2 uvR  = barrel(vUv + (vUv - 0.5) *  ca, uStrength);
      vec2 uvG  = barrel(vUv,                       uStrength);
      vec2 uvB  = barrel(vUv - (vUv - 0.5) *  ca, uStrength);

      // Fuera de rango → negro limpio (bordes curvos del "ojo")
      bool outR = uvR.x<0.0||uvR.x>1.0||uvR.y<0.0||uvR.y>1.0;
      bool outG = uvG.x<0.0||uvG.x>1.0||uvG.y<0.0||uvG.y>1.0;
      bool outB = uvB.x<0.0||uvB.x>1.0||uvB.y<0.0||uvB.y>1.0;

      float colR = outR ? 0.0 : texture2D(tDiffuse, uvR).r;
      float colG = outG ? 0.0 : texture2D(tDiffuse, uvG).g;
      float colB = outB ? 0.0 : texture2D(tDiffuse, uvB).b;

      // Vignette muy sutil — apenas perceptible, solo toca las esquinas extremas
      float vr   = length(vUv - 0.5) * uVignette * 2.0;
      float vig  = 1.0 - smoothstep(0.85, 1.55, vr);
      vig        = pow(vig, 0.5);             // curva casi plana — centro intacto

      gl_FragColor = vec4(vec3(colR, colG, colB) * vig, 1.0);
    }
  `,
};
const lensPass = new ShaderPass(LensShader);
composer.addPass(lensPass);

// ══════════════════════════════════════════════════════════════════════
//  PLANETA — Cinematic background: dark sphere + rim light + atmosphere
//  PP.y = -22 garantiza separación mínima 22 units (> PR=18) con todos los cards
// ══════════════════════════════════════════════════════════════════════
const PR = 18;
const PP = new THREE.Vector3(-4, -22, -32);

// Direction from planet toward light source (normalized)
const _lightDir = new THREE.Vector3(64, 62, 82).normalize();

// ── Surface shader — dark planet with ice-blue Fresnel rim ────────────
const planetMat = new THREE.ShaderMaterial({
  uniforms: {
    uTime:     { value: 0.0 },
    uLightDir: { value: _lightDir },
    uRimColor: { value: new THREE.Color(0.42, 0.62, 1.00) },
    uRimPow:   { value: 3.8 },
    uCamPos:   { value: camera.position },
  },
  vertexShader: `
    varying vec3 vNormal;
    varying vec3 vWorldPos;
    void main() {
      vec4 wp   = modelMatrix * vec4(position, 1.0);
      vWorldPos = wp.xyz;
      vNormal   = normalize(mat3(modelMatrix) * normal);
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    uniform float uTime;
    uniform vec3  uLightDir;
    uniform vec3  uRimColor;
    uniform float uRimPow;
    uniform vec3  uCamPos;
    varying vec3  vNormal;
    varying vec3  vWorldPos;

    float hash(vec3 p) {
      p  = fract(p * vec3(127.1, 311.7, 74.7));
      p += dot(p.zxy, p.yxz + 17.9);
      return fract(p.x * p.y * p.z * 43758.54);
    }
    float vnoise(vec3 p) {
      vec3 i = floor(p), f = fract(p);
      f = f*f*(3.0-2.0*f);
      return mix(
        mix(mix(hash(i),             hash(i+vec3(1,0,0)), f.x),
            mix(hash(i+vec3(0,1,0)), hash(i+vec3(1,1,0)), f.x), f.y),
        mix(mix(hash(i+vec3(0,0,1)), hash(i+vec3(1,0,1)), f.x),
            mix(hash(i+vec3(0,1,1)), hash(i+vec3(1,1,1)), f.x), f.y),
        f.z);
    }
    float fbm(vec3 p) {
      float v = 0.0, a = 0.5;
      for(int i = 0; i < 5; i++) { v += a * vnoise(p); p *= 2.07; a *= 0.48; }
      return v;
    }

    void main() {
      vec3 N = normalize(vNormal);
      vec3 V = normalize(uCamPos - vWorldPos);
      vec3 L = uLightDir;

      // Surface noise — subtle terrain, slow atmospheric drift
      float n1 = fbm(N * 2.8 + uTime * 0.0018);
      float n2 = fbm(N * 7.2 + vec3(5.3, 1.7, 3.9));

      // Day/night terminator
      float NdotL  = dot(N, L);
      float day    = smoothstep(-0.18, 0.28, NdotL);

      vec3 dayCol  = vec3(0.038, 0.072, 0.165) + n1 * vec3(0.014, 0.026, 0.052);
      vec3 nightCol= vec3(0.005, 0.009, 0.020) + n2 * 0.004;
      vec3 surface = mix(nightCol, dayCol, day);

      // Diffuse — cold blue-white key light
      surface += dayCol * max(0.0, NdotL) * vec3(0.50, 0.66, 1.0) * 0.50;

      // Specular — icy glint at terminator
      vec3 H   = normalize(L + V);
      float sp = pow(max(0.0, dot(N, H)), 72.0) * max(0.0, NdotL);
      surface += vec3(0.68, 0.84, 1.0) * sp * 0.14;

      // Fresnel rim — main cinematic signature
      float fr = pow(1.0 - max(0.0, dot(N, V)), uRimPow);
      surface += uRimColor * fr * 1.10;

      // Night-side rim — deep space undertone
      surface += vec3(0.02, 0.04, 0.14) * fr * (1.0 - day) * 0.6;

      gl_FragColor = vec4(surface, 1.0);
    }
  `,
});

const planet = new THREE.Mesh(new THREE.SphereGeometry(PR, 96, 96), planetMat);
planet.position.copy(PP);
scene.add(planet);

// ── Atmosphere shaders — shared vert, two instances (inner + outer halo) ──
const _atmosVert = `
  varying vec3 vNormal; varying vec3 vWorldPos;
  void main() {
    vec4 wp   = modelMatrix * vec4(position, 1.0);
    vWorldPos = wp.xyz;
    vNormal   = normalize(mat3(modelMatrix) * normal);
    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
  }
`;
const _atmosFrag = `
  uniform vec3  uLightDir;
  uniform vec3  uColor;
  uniform float uIntensity;
  uniform vec3  uCamPos;
  varying vec3  vNormal; varying vec3 vWorldPos;
  void main() {
    vec3 N  = normalize(vNormal);
    vec3 V  = normalize(uCamPos - vWorldPos);
    float fr  = 1.0 - abs(dot(N, V));
    fr        = pow(fr, 3.2);
    float lit = dot(N, uLightDir) * 0.5 + 0.5;
    float a   = fr * lit * uIntensity;
    gl_FragColor = vec4(uColor * a, a);
  }
`;
const _atmosBase = { uLightDir:{ value:_lightDir }, uCamPos:{ value:camera.position } };

const atmos = new THREE.Mesh(
  new THREE.SphereGeometry(PR + 2.8, 48, 48),
  new THREE.ShaderMaterial({
    uniforms: { ..._atmosBase,
      uColor:     { value: new THREE.Color(0.30, 0.55, 1.0) },
      uIntensity: { value: 1.05 },
    },
    vertexShader: _atmosVert, fragmentShader: _atmosFrag,
    transparent: true, blending: THREE.AdditiveBlending,
    side: THREE.BackSide, depthWrite: false,
  })
);
atmos.position.copy(PP);
scene.add(atmos);

const halo = new THREE.Mesh(
  new THREE.SphereGeometry(PR + 9.0, 48, 48),
  new THREE.ShaderMaterial({
    uniforms: { ..._atmosBase,
      uColor:     { value: new THREE.Color(0.18, 0.38, 0.90) },
      uIntensity: { value: 0.30 },
    },
    vertexShader: _atmosVert, fragmentShader: _atmosFrag,
    transparent: true, blending: THREE.AdditiveBlending,
    side: THREE.BackSide, depthWrite: false,
  })
);
halo.position.copy(PP);
scene.add(halo);

// ── Rings — additive glow, cinematic incandescence ────────────────────
const RING_DEFS = [

// Radio de exclusión = superficie del planeta + margen visual
const _PLANET_CLEAR = PR + 10; // 28 units — ninguna partícula dentro de esta esfera

function _mkParticles(N, rMin, rMax, rPow, szFn, uOpts) {
  const pos=new Float32Array(N*3), col=new Float32Array(N*3), sz=new Float32Array(N);
  for (let i=0;i<N;i++){
    let px,py,pz;
    // Rechazar posiciones que caigan dentro del clearance del planeta
    do {
      const th=Math.random()*Math.PI*2, ph=Math.acos(2*Math.random()-1);
      const r=rMin+Math.pow(Math.random(),rPow)*(rMax-rMin);
      px=r*Math.sin(ph)*Math.cos(th); py=r*Math.sin(ph)*Math.sin(th); pz=r*Math.cos(ph);
    } while (
      (px-PP.x)*(px-PP.x)+(py-PP.y)*(py-PP.y)+(pz-PP.z)*(pz-PP.z) < _PLANET_CLEAR*_PLANET_CLEAR
    );
    pos[i*3]=px; pos[i*3+1]=py; pos[i*3+2]=pz;
    const rnd=Math.random(), c=new THREE.Color();
    if(rnd>0.90)c.setHex(0xffddaa); else if(rnd>0.85)c.setHex(0xddeeff); else c.setHex(0xffffff);
    col[i*3]=c.r; col[i*3+1]=c.g; col[i*3+2]=c.b;
    sz[i]=szFn();
  }
  const geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  geo.setAttribute('aColor',  new THREE.BufferAttribute(col,3));
  geo.setAttribute('aSize',   new THREE.BufferAttribute(sz, 1));
  const uni={
    uTime:{value:0}, uSpeed:{value:uOpts.speed}, uFreq:{value:uOpts.freq}, uAmp:{value:uOpts.amp},
    uAlphaMult:{value:uOpts.alphaMult},
    uMouse:{value:new THREE.Vector2()}, uAspect:{value:W/H},
    uMouseForce:{value:uOpts.mouseForce||0},
    uLogoPos:{value:new THREE.Vector2()}, uLogoForce:{value:0},
    uPixelRatio:{value:Math.min(devicePixelRatio,2)}
  };
  scene.add(new THREE.Points(geo, new THREE.ShaderMaterial({
    vertexShader:particleVertexShader, fragmentShader:particleFragmentShader,
    uniforms:uni, transparent:true, depthWrite:false, blending:THREE.AdditiveBlending
  })));
  return uni;
}

//  CARDS
// ══════════════════════════════════════════════════════════════════════
const CARD_W = 5.0, CARD_H = 3.0;
const CV_W = 2048, CV_H = 1229;
const cards = [];
const _sv    = new THREE.Vector3();
const _ppNDC = new THREE.Vector3();

function _buildCards() { PROJECTS.forEach((proj, i) => {
  const lp     = LAYOUT[i];
  const col    = new THREE.Color(proj.col[0], proj.col[1], proj.col[2]);
  const colRGB = `${Math.round(proj.col[0]*255)},${Math.round(proj.col[1]*255)},${Math.round(proj.col[2]*255)}`;

  const bgMat  = new THREE.MeshBasicMaterial({ color: 0x060c1c, transparent: true, opacity: 0.68, side: THREE.DoubleSide });
  const bgMesh = new THREE.Mesh(new THREE.PlaneGeometry(CARD_W, CARD_H), bgMat);
  bgMesh.position.set(lp[0], lp[1], lp[2]);
  bgMesh.rotation.y = lp[3];

  const borderMat = new THREE.LineBasicMaterial({ color: col, transparent: true, opacity: 0.22 });
  const frame     = new THREE.LineSegments(
    new THREE.EdgesGeometry(new THREE.PlaneGeometry(CARD_W, CARD_H)),
    borderMat
  );
  frame.position.copy(bgMesh.position);
  frame.rotation.copy(bgMesh.rotation);

  // ── Canvas texture — LEGIBILIDAD PRIMERO (sin sobrebrillo) ──
  const cv  = document.createElement('canvas');
  cv.width  = CV_W; cv.height = CV_H;
  const ctx = cv.getContext('2d');
  ctx.clearRect(0, 0, CV_W, CV_H);
  const pad = 100;

  // Categoría
  ctx.font          = `500 20px "Space Mono", monospace`;
  ctx.letterSpacing = '5px';
  ctx.fillStyle     = `rgba(${colRGB}, 0.55)`;
  ctx.fillText(proj.cat[0].toUpperCase(), pad, 90);

  // Título
  const tSz = proj.title.length > 16 ? 56 : proj.title.length > 10 ? 68 : 80;
  ctx.font          = `800 ${tSz}px "Syne", sans-serif`;
  ctx.fillStyle     = 'rgba(255,255,255,0.48)';
  ctx.letterSpacing = '-1px';
  const words = proj.title.split(' ');
  let line = '', ty = 210;
  for (const w of words) {
    const test = line + w + ' ';
    if (ctx.measureText(test).width > CV_W - pad * 2 && line) {
      ctx.fillText(line.trim(), pad, ty); line = w + ' '; ty += tSz * 1.18;
    } else { line = test; }
  }
  ctx.fillText(line.trim(), pad, ty);

  // Divisor
  ctx.strokeStyle = 'rgba(255,255,255,0.14)';
  ctx.lineWidth   = 1;
  ctx.beginPath(); ctx.moveTo(pad, ty + 28); ctx.lineTo(CV_W - pad, ty + 28); ctx.stroke();

  // Cliente
  ctx.font          = `400 18px "Space Mono", monospace`;
  ctx.letterSpacing = '2px';
  ctx.fillStyle     = 'rgba(255,255,255,0.45)';
  ctx.textAlign     = 'left';
  ctx.fillText(proj.client.toUpperCase(), pad, ty + 54);

  // Año
  ctx.font          = `400 16px "Space Mono", monospace`;
  ctx.fillStyle     = 'rgba(255,255,255,0.20)';
  ctx.textAlign     = 'right';
  ctx.fillText(String(proj.year), CV_W - pad, CV_H - 32);

  // Corner marks
  const mk = 36;
  ctx.strokeStyle = `rgba(${colRGB}, 0.60)`;
  ctx.lineWidth   = 4;
  [[pad, pad], [CV_W-pad, pad], [pad, CV_H-pad], [CV_W-pad, CV_H-pad]].forEach(([cx, cy], ci) => {
    const sx = ci % 2 === 0 ? 1 : -1, sy = ci < 2 ? 1 : -1;
    ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx + sx*mk, cy); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx, cy + sy*mk); ctx.stroke();
  });

  const tex = new THREE.CanvasTexture(cv);
  tex.anisotropy = renderer.capabilities.getMaxAnisotropy();

  const NZ      = 0.8;
  const textMesh = new THREE.Mesh(
    new THREE.PlaneGeometry(CARD_W, CARD_H),
    new THREE.MeshBasicMaterial({ map: tex, transparent: true, depthWrite: false, depthTest: false })
  );
  textMesh.renderOrder = 1;
  textMesh.position.set(
    lp[0] + Math.sin(lp[3]) * NZ,
    lp[1],
    lp[2] + Math.cos(lp[3]) * NZ
  );
  textMesh.rotation.copy(bgMesh.rotation);

  // ── Video texture — solo si el proyecto tiene videoSrc ──────────────
  let videoEl   = null;
  let videoMesh = null;
  if (proj.videoSrc) {
    videoEl          = document.createElement('video');
    videoEl.src      = proj.videoSrc;
    videoEl.loop     = true;
    videoEl.muted    = true;
    videoEl.playsInline = true;
    videoEl.preload  = 'none';
    videoEl.style.display = 'none';
    document.body.appendChild(videoEl);

    const videoTex = new THREE.VideoTexture(videoEl);
    videoTex.minFilter = THREE.LinearFilter;
    videoTex.magFilter = THREE.LinearFilter;

    // ── Video mesh con blur suave (5 samples en cruz) ──────────────────
    const VZ = 0.015;
    videoMesh = new THREE.Mesh(
      new THREE.PlaneGeometry(CARD_W, CARD_H),
      new THREE.ShaderMaterial({
        uniforms: { uVideo: { value: videoTex } },
        vertexShader: `
          varying vec2 vUv;
          void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0); }
        `,
        fragmentShader: `
          uniform sampler2D uVideo;
          varying vec2 vUv;
          void main() {
            float b = 0.004;
            vec4 c  = texture2D(uVideo, vUv);
            c += texture2D(uVideo, vUv + vec2( b, 0.0));
            c += texture2D(uVideo, vUv + vec2(-b, 0.0));
            c += texture2D(uVideo, vUv + vec2(0.0,  b));
            c += texture2D(uVideo, vUv + vec2(0.0, -b));
            gl_FragColor = c / 5.0;
          }
        `,
      })
    );
    // Video va DETRÁS del bgMesh — el bgMesh actúa de overlay natural controlando la luminancia
    videoMesh.position.set(
      lp[0] - Math.sin(lp[3]) * VZ,
      lp[1],
      lp[2] - Math.cos(lp[3]) * VZ
    );
    videoMesh.rotation.copy(bgMesh.rotation);
    videoMesh.renderOrder = 0;
    videoMesh.visible     = false;
    scene.add(videoMesh);
  }

  scene.add(bgMesh, frame, textMesh);
  textMesh.material.opacity = 0;
  cards.push({
    bgMesh, bgMat, frame, borderMat, textMesh, proj,
    base:  new THREE.Vector3(lp[0], lp[1], lp[2]),
    rotY:  lp[3], float: Math.random() * Math.PI * 2, NZ,
    videoEl, videoMesh,
    textAlpha: 0, textDrift: 0.08, textDelay: 0.5,
  });
  }); // end forEach
  // Primera tarjeta arranca visible — sin animación
  if (cards.length > 0) {
    cards[0].textAlpha = 1.0;
    cards[0].textDrift = 0;
    cards[0].textMesh.material.opacity = 1.0;
  }
} // end _buildCards

// ── Animación de entrada/salida de flechas ────────────────────────────
// _btnState declarado al inicio del módulo

function _animBtn(btn, shouldHide) {
  const wasHidden = _btnState.get(btn) ?? true; // primera vez = hidden (sin anim)
  if (shouldHide === wasHidden) return;          // sin cambio → nada que animar
  _btnState.set(btn, shouldHide);

  // Limpiar clases de animación previas
  btn.classList.remove('cn-hidden', 'cn-entering', 'cn-exiting');

  if (shouldHide) {
    // Salida — anima y al terminar aplica estado oculto definitivo
    btn.classList.add('cn-exiting');
    btn.addEventListener('animationend', () => {
      btn.classList.remove('cn-exiting');
      btn.classList.add('cn-hidden');
    }, { once: true });
  } else {
    // Entrada — arranca desde posición oculta y anima hacia visible
    btn.classList.add('cn-hidden'); // posición inicial sin transición
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {   // doble rAF → garantiza reflow antes de animar
        btn.classList.remove('cn-hidden');
        btn.classList.add('cn-entering');
        btn.addEventListener('animationend', () => {
          btn.classList.remove('cn-entering');
        }, { once: true });
      });
    });
  }
}

function updateProgress() {
  const pct = PROJECTS.length > 1 ? (idx / (PROJECTS.length-1)) * 100 : 0;
  document.getElementById('prog').style.width = pct + '%';

  if (thumb) thumb.style.left = pct + '%';

  _animBtn(document.getElementById('cn-next'), idx === PROJECTS.length - 1);
}

function triggerZoom(targetIdx) {
  if (!introOK || isZooming) return;
  isZooming = true;
  panel.classList.remove('vis');
  cinNav.classList.remove('vis');
  cards.forEach(c => { if (c.videoEl) { c.videoEl.pause(); c.videoMesh.visible = false; } });
  curR.classList.remove('on');

  const tc      = cards[targetIdx];
  const cardPos = tc.base.clone();
  const startP  = camera.position.clone();
  const startL  = camLook.clone();
  const endP    = new THREE.Vector3(
    cardPos.x + Math.sin(tc.rotY) * -1.5,
    cardPos.y,
    cardPos.z + Math.cos(tc.rotY) * 1.5
  );

  // Proxy para animar valores Three.js via GSAP
  const proxy = { t: 0, s: 1.0, blur: 0 };

  gsap.timeline({ defaults: { ease: 'power2.inOut' } })
    .to(proxy, {
      t: 1, s: 2.8, duration: 0.72,
      onUpdate() {
        camera.position.lerpVectors(startP, endP, proxy.t);
        camLook.lerpVectors(startL, cardPos, proxy.t);
        camera.lookAt(camLook);
        tc.bgMesh.scale.setScalar(proxy.s);
        tc.frame.scale.setScalar(proxy.s);
        tc.textMesh.scale.setScalar(proxy.s);
        if (tc.videoMesh) tc.videoMesh.scale.setScalar(proxy.s);
      }
    }, 0)
    .to(proxy, {
      blur: 1, duration: 0.36, ease: 'power2.in',
      onUpdate() { zblur.style.opacity = proxy.blur.toFixed(3); }
    }, 0.36)
    .call(() => {
      sessionStorage.setItem('returnPanel',    'WORK');
      sessionStorage.setItem('returnFlag',     '1');
      sessionStorage.setItem('fromProject',    '1');
      sessionStorage.setItem('fromProjectIdx', String(targetIdx));
      window.location.href = `${tc.proj.slug}/`;
    }, null, 0.68);
}

// ══════════════════════════════════════════════════════════════════════
//  NAVEGACIÓN
// ══════════════════════════════════════════════════════════════════════
function goTo(i) {
  if (!introOK || isTrans || isZooming) return;
  const prev = idx;
  idx = Math.max(0, Math.min(cards.length-1, i));
  if (idx === prev) return;
  isTrans = true;
  uiChord(idx > prev ? [329.6, 493.8] : [493.8, 329.6], .050, .010, .55, .04);
  zblur.style.opacity = '0.22';
  setTimeout(() => { zblur.style.opacity = '0'; isTrans = false; }, 360);
  updateUI();
  updateProgress();

  clearTimeout(_bloomTimer);
  bloomTarget = 1.8;
  _bloomTimer = setTimeout(() => { bloomTarget = 0.8; }, 140);
}

document.getElementById('cn-prev').addEventListener('click', () => goTo(idx - 1));
document.getElementById('cn-next').addEventListener('click', () => goTo(idx + 1));


// "Ver proyecto" — misma animación que click en card
document.getElementById('p-cta').addEventListener('click', e => {
  e.preventDefault();
  triggerZoom(idx);
});

// ── AUDIO — hover sounds en todos los controles interactivos ──────────
document.getElementById('cn-prev').addEventListener('mouseenter', () => uiSound('hover:nav-prev'));
document.getElementById('cn-next').addEventListener('mouseenter', () => uiSound('hover:nav-next'));

document.getElementById('p-cta').addEventListener('mouseenter',    () => uiSound('hover:see-all'));
document.getElementById('p-behance').addEventListener('mouseenter',() => uiSound('hover:pm-card-cta'));
document.getElementById('p-link').addEventListener('mouseenter',   () => uiSound('hover:pm-card-cta'));

let sLock = false;
document.addEventListener('wheel', e => {
  if (sLock || isZooming) return;
  sLock = true;
  goTo(idx + (e.deltaY > 0 ? 1 : -1));
  setTimeout(() => { sLock = false; }, 480);
}, { passive: true });

document.addEventListener('keydown', e => {
  if (isZooming) return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') goTo(idx + 1);
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   goTo(idx - 1);
});

// ══════════════════════════════════════════════════════════════════════
//  MOUSE
// ══════════════════════════════════════════════════════════════════════
document.addEventListener('mousemove', e => {
  mouse.x  = e.clientX; mouse.y  = e.clientY;
  mouse.sx = (e.clientX / W) * 2 - 1;
  mouse.sy = -(e.clientY / H) * 2 + 1;
  mouseUV.set(e.clientX / W, 1.0 - e.clientY / H);
  cur.style.left = e.clientX + 'px';
  cur.style.top  = e.clientY + 'px';
});

// ══════════════════════════════════════════════════════════════════════
//  RAYCASTER
// ══════════════════════════════════════════════════════════════════════
const ray  = new THREE.Raycaster();
const mNDC = new THREE.Vector2();
let prevHovered = null;

renderer.domElement.addEventListener('mousemove', e => {
  if (isZooming) return;
  mNDC.set((e.clientX / W) * 2 - 1, -(e.clientY / H) * 2 + 1);
  ray.setFromCamera(mNDC, camera);
  const hits = ray.intersectObjects(cards.map(c => c.bgMesh));
  hovered = hits.length ? hits[0].object : null;
  if (hovered !== prevHovered) {
    if (hovered) uiSound('hover:pm-card');
    prevHovered = hovered;
  }
  curR.classList.toggle('on', !!hovered);
});

renderer.domElement.addEventListener('click', () => {
  if (!hovered || !introOK || isZooming) return;
  const ci = cards.findIndex(c => c.bgMesh === hovered);
  if (ci < 0) return;
  goTo(ci);           // primero centra en ese card
  triggerZoom(ci);    // luego zoom inmediato
});

// ══════════════════════════════════════════════════════════════════════
//  CÁMARA — desplaza lookAt 2 units izq para compensar panel derecho
// ══════════════════════════════════════════════════════════════════════
function _camTarget(i) {
  const lp = LAYOUT[i], ry = lp[3];
  camPT.set(lp[0] + Math.sin(ry) * -5.2, 2.8, lp[2] + 5.5);
  camLT.set(lp[0] - 1.0, lp[1], lp[2]);   // offset -1 en X → más centrado, panel no lo tapa
}

// ══════════════════════════════════════════════════════════════════════
//  LOOP
// ══════════════════════════════════════════════════════════════════════
let _prevCamZ = camera.position.z;

function animate() {
  requestAnimationFrame(animate);
  if (isZooming) { composer.render(); return; }

  const t     = clock.getElapsedTime();
  const delta = t - (animate._pt || 0);
  animate._pt = t;

  // Cámara
  _camTarget(idx);
  const ls = introOK ? 0.055 : 0.018;
  camPos.lerp(camPT, ls);
  camLook.lerp(camLT, ls + 0.01);
  mouse.rx += (mouse.sx * 0.5 - mouse.rx) * 0.035;
  mouse.ry += (mouse.sy * 0.22 - mouse.ry) * 0.035;
  camera.position.set(camPos.x + mouse.rx * 0.35, camPos.y + mouse.ry * 0.22, camPos.z);
  camera.lookAt(camLook);

  // Tilt de cards — dirección contraria al mouse, muy sutil
  // Curva ease-out: potencia 0.6 — movimientos pequeños muy reactivos, extremos suaves
  const _tx = Math.sign(mouse.sx) * Math.pow(Math.abs(mouse.sx), 0.6);
  const _ty = Math.sign(mouse.sy) * Math.pow(Math.abs(mouse.sy), 0.6);
  tilt.x += (-_tx * 0.18 - tilt.x) * 0.06;
  tilt.y += (-_ty * 0.11 - tilt.y) * 0.06;

  // Cursor
  curRX += (mouse.x - curRX) * 0.10;
  curRY += (mouse.y - curRY) * 0.10;
  curR.style.left = curRX + 'px'; curR.style.top = curRY + 'px';

  // Event Horizon
  mouseVel.subVectors(mouseUV, mouseUVPrev).multiplyScalar(60);
  mouseUVPrev.copy(mouseUV);
  eventHorizonPass.uniforms.uMousePos.value.copy(mouseUV);
  eventHorizonPass.uniforms.uMouseVelocity.value.copy(mouseVel);
  eventHorizonPass.uniforms.uMouseSpeed.value = mouseVel.length();
  eventHorizonPass.uniforms.uTime.value       = t;

  grainPass.uniforms.uTime.value = t;

  // Particles — tiempo + mouse NDC (black-hole) igual que hub
  window._pUniA.uTime.value   = t;
  window._pUniB.uTime.value   = t;
  window._pUniC.uTime.value   = t;
  window._pUniB.uMouse.value.copy(mNDC);
  window._pUniC.uMouse.value.copy(mNDC);
  window._pUniB.uAspect.value = W / H;
  window._pUniC.uAspect.value = W / H;

  // God rays → planeta
  _ppNDC.copy(PP).project(camera);
  godRaysPass.uniforms.uLightPos.value.set((_ppNDC.x + 1) * 0.5, (_ppNDC.y + 1) * 0.5);

  // Entry blur — decae desde 0.65 hasta 0 durante el descenso de cámara (~1.3s)
  if (_entryBlur > 0) {
    _entryBlur = Math.max(0, _entryBlur - delta * 0.80);
    zoomBlurPass.uniforms.uStrength.value = _entryBlur;
  }

  // Bloom
  const bSpd = bloomTarget > bloomPass.strength ? 0.35 : 0.05;
  bloomPass.strength += (bloomTarget - bloomPass.strength) * bSpd;

  // Chroma
  const camVel = Math.abs(camera.position.z - _prevCamZ);
  _prevCamZ    = camera.position.z;
  chromaPass.uniforms.uIntensity.value += (0.002 + camVel * 0.006 - chromaPass.uniforms.uIntensity.value) * 0.06;

  // Cards
  cards.forEach((card, i) => {
    const isA = i === idx;
    const isH = card.bgMesh === hovered;
    const fy  = card.base.y + Math.sin(t * 0.4 + card.float) * 0.12;

    card.bgMesh.position.y    = fy;
    card.frame.position.y     = fy;
    if (card.videoMesh) card.videoMesh.position.y = fy;

    // Tilt reactivo al mouse (todos los meshes del card en conjunto)
    card.bgMesh.rotation.set(tilt.y, card.rotY + tilt.x, 0);
    card.frame.rotation.set(tilt.y, card.rotY + tilt.x, 0);
    card.textMesh.rotation.set(tilt.y, card.rotY + tilt.x, 0);
    if (card.videoMesh) card.videoMesh.rotation.set(tilt.y, card.rotY + tilt.x, 0);

    // Texto: delay 1s → fade-in lento + drift Y de asentamiento
    if (isA) {
      card.textDelay = Math.max(0, card.textDelay - delta);
      if (card.textDelay <= 0) {
        card.textAlpha += (1.0 - card.textAlpha) * 0.045;
        card.textDrift += (0.0  - card.textDrift) * 0.055;
      }
    } else {
      card.textDelay = 0.5; // reset para próxima activación
      card.textAlpha += (0.0  - card.textAlpha) * 0.09;
      card.textDrift += (0.08 - card.textDrift) * 0.055;
    }
    card.textMesh.material.opacity = card.textAlpha;
    card.textMesh.position.y       = fy + card.textDrift;

    _sv.setScalar(isA ? 1.0 : isH ? 0.985 : 0.958);
    card.bgMesh.scale.lerp(_sv, 0.07);
    card.frame.scale.copy(card.bgMesh.scale);
    card.textMesh.scale.copy(card.bgMesh.scale);
    if (card.videoMesh) card.videoMesh.scale.copy(card.bgMesh.scale);

    card.borderMat.opacity += ((isA ? 0.88 : isH ? 0.52 : 0.20) - card.borderMat.opacity) * 0.10;
    card.bgMat.opacity     += ((isA ? 0.80 : isH ? 0.60 : 0.40) - card.bgMat.opacity)     * 0.08;
  });

  // Planeta
  planetMat.uniforms.uTime.value = t;
  planet.rotation.y        += 0.000055;
  ringMeshes[0].rotation.z += 0.000065;
  ringMeshes[1].rotation.z -= 0.000038;
  ringMeshes[2].rotation.z += 0.000095;
  ringMeshes[3].rotation.z -= 0.000022;

  composer.render();
}

window.addEventListener('resize', () => {
  W = window.innerWidth; H = window.innerHeight;
  camera.aspect = W / H; camera.updateProjectionMatrix();
  renderer.setSize(W, H); composer.setSize(W, H);
  eventHorizonPass.uniforms.uAspect.value   = W / H;
  vignetteChromaPass.uniforms.uAspect.value = W / H;
  lensPass.uniforms.uAspect.value           = W / H;
});

document.fonts.ready.then(() => { _buildCards(); updateProgress(); animate(); });
</script>
</body>
</html>
