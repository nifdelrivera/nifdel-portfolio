<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rachin — Nifdel Rivera</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../nav.css">
<style>
/* ── RESET ───────────────────────────────────────────────────────────── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; cursor: none !important; }
:root {
  --accent: rgb(58,102,204);
  --bg:     #020408;
  --text:   rgba(255,255,255,.82);
  --dim:    rgba(255,255,255,.38);
  --faint:  rgba(255,255,255,.14);
  --mono:   'Space Mono', monospace;
  --display:'Syne', sans-serif;
}
html { scroll-behavior: smooth; }
body {
  background: var(--bg); color: var(--text);
  font-family: var(--mono);
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ── CURSOR ──────────────────────────────────────────────────────────── */
#cur   { position: fixed; width: 6px; height: 6px; background: #fff; border-radius: 50%; pointer-events: none; z-index: 9999; transform: translate(-50%,-50%); }
#cur-r { position: fixed; width: 28px; height: 28px; border: 1px solid rgba(255,255,255,.22); border-radius: 50%; pointer-events: none; z-index: 9998; transform: translate(-50%,-50%); transition: width .3s, height .3s, border-color .3s; }

/* ── PAGE FADE ───────────────────────────────────────────────────────── */
#pf-fade { position: fixed; inset: 0; background: #000; z-index: 9000; pointer-events: none; opacity: 0; }

/* nav.css provee top-nav + side-nav */

/* ── HERO ────────────────────────────────────────────────────────────── */
#hero {
  width: 100vw; height: 100vh;
  position: relative; overflow: hidden;
  background: #000;
  display: flex; align-items: center; justify-content: center;
}
#hero img {
  width: 100%; height: 100%;
  border: none; position: absolute; inset: 0; object-fit: cover;
}
#hero iframe {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 177.78vh;
  height: 56.25vw;
  min-width: 100%; min-height: 100%;
  border: none;
}
.hero-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to bottom, rgba(2,4,8,.25) 0%, transparent 50%, rgba(2,4,8,.92) 100%);
  pointer-events: none;
}
.hero-meta {
  position: absolute; bottom: 52px; left: 108px;
  z-index: 10; pointer-events: none;
}
.hero-cat {
  font-size: 9px; letter-spacing: .45em; color: var(--accent);
  margin-bottom: 10px; opacity: .8;
}
.hero-title {
  font-family: var(--display); font-size: 58px; font-weight: 800;
  color: rgba(255,255,255,.90); letter-spacing: -.03em; line-height: 1.0;
}

/* ── META BAR ────────────────────────────────────────────────────────── */
#meta {
  padding: 52px 80px 44px 108px;
  display: grid;
  grid-template-columns: 1fr auto;
  grid-template-rows: auto auto;
  gap: 8px 48px;
  border-bottom: 1px solid rgba(255,255,255,.05);
  margin-bottom: 80px;
}
.meta-client {
  font-size: 12px; letter-spacing: .22em; color: var(--accent);
  grid-column: 1; grid-row: 1; margin-top: 4px;
}
.meta-year {
  font-size: 11px; letter-spacing: .18em; color: rgba(255,255,255,.22);
  grid-column: 2; grid-row: 1; align-self: start; margin-top: 6px;
  text-align: right;
}
.meta-tags {
  display: flex; gap: 8px; flex-wrap: wrap;
  grid-column: 1; grid-row: 2;
}
.meta-tag {
  font-size: 9px; letter-spacing: .15em; padding: 4px 12px;
  border: 1px solid rgba(255,255,255,.10); color: rgba(255,255,255,.35);
}

/* ── BLOCKS ──────────────────────────────────────────────────────────── */
#blocks {
  max-width: 1200px; margin: 0 auto;
  padding: 0 80px 140px 108px;
  display: flex; flex-direction: column; gap: 72px;
}

.block-section-label {
  font-size: 9px; letter-spacing: .45em; color: rgba(255,255,255,.20);
  text-transform: uppercase; margin-bottom: -52px;
}
.block-text {
  font-size: 15px; line-height: 2.0;
  color: rgba(255,255,255,.46); max-width: 660px;
}
.block-video { width: 100%; aspect-ratio: 16/9; background: #000; }
.block-video iframe { width: 100%; height: 100%; border: none; display: block; }
.block-image img { width: 100%; display: block; }
.block-image.full { margin: 0 -80px 0 -108px; width: calc(100% + 188px); }
.block-grid { display: grid; gap: 6px; }
.block-grid.cols-2 { grid-template-columns: 1fr 1fr; }
.block-grid.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
.block-grid img { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; }
.block-quote {
  font-family: var(--display); font-size: 26px; font-weight: 700;
  color: rgba(255,255,255,.80); line-height: 1.4;
  border-left: 2px solid var(--accent); padding-left: 28px;
  max-width: 720px;
}
.block-embed { width: 100%; }
.block-embed iframe { width: 100%; border: none; display: block; }
.block-caption { font-size: 10px; color: rgba(255,255,255,.25); margin-top: 10px; letter-spacing: .1em; }

/* Placeholder cuando no hay media real */
.block-placeholder {
  width: 100%; aspect-ratio: 16/9;
  background: rgba(255,255,255,.03);
  border: 1px solid rgba(255,255,255,.06);
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 12px;
}
.block-placeholder span {
  font-size: 10px; letter-spacing: .3em; color: rgba(255,255,255,.18);
}

/* ── NEXT PROJECT ────────────────────────────────────────────────────── */
#next-project {
  border-top: 1px solid rgba(255,255,255,.05);
  padding: 56px 80px 56px 108px;
  display: flex; align-items: center; justify-content: space-between;
  text-decoration: none;
  transition: background .2s;
}
#next-project:hover { background: rgba(255,255,255,.015); }
.np-label { font-size: 9px; letter-spacing: .4em; color: rgba(255,255,255,.22); }
.np-title {
  font-family: var(--display); font-size: 28px; font-weight: 800;
  color: rgba(255,255,255,.88); letter-spacing: -.02em; margin-top: 8px;
}
.np-arrow { font-size: 24px; color: rgba(255,255,255,.18); }
</style>
</head>
<body>

<div id="cur"></div>
<div id="cur-r"></div>
<div id="pf-fade"></div>

<!-- TOP NAV -->
<nav id="top-nav" class="nav-on">
  <div class="tn-logo-wrap">
    <img src="../../assets/LOGO.svg" alt="Nifdel Rivera" class="tn-logo-img">
  </div>
  <div class="tn-pills">
    <div class="tn-pill">
      <span class="tp-name">Nifdel Rivera</span>
      <span class="tp-sep">·</span>
      <span class="tp-role">Creative Technologist</span>
    </div>
    <div class="tn-pill">
      <span class="tn-dot"></span>
      <span class="tp-state" id="nav-title">Work · Rachin</span>
    </div>
    <button class="tn-pill tn-pill-btn" id="audio-btn" aria-label="Audio">
      <div class="ab-icon">
        <span></span><span></span><span></span><span></span>
      </div>
      <span id="ab-label">Enable Audio</span>
    </button>
  </div>
</nav>

<!-- SIDE NAV -->
<div id="side-nav" class="visible">
  <button class="sn-clickable" id="back-btn">
    <div class="sn-state-dot"></div>
    <span class="sn-label">Volver</span>
    <div class="sn-arrow">
      <svg class="sn-ring" viewBox="0 0 44 44" fill="none">
        <circle class="sn-ring-track"    cx="22" cy="22" r="19"/>
        <circle class="sn-ring-progress" cx="22" cy="22" r="19"/>
      </svg>
      <svg class="sn-chevron" viewBox="0 0 14 14" fill="none">
        <polyline points="9,2 5,7 9,12"
          stroke="currentColor" stroke-width="1.5"
          stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <span class="sn-sub">al trabajo</span>
  </button>
</div>

<div id="page-content">

<section id="hero"></section>

<section id="meta">
  <div class="meta-client" id="meta-client"></div>
  <div class="meta-year"   id="meta-year"></div>
  <div class="meta-tags"   id="meta-tags"></div>
</section>

<main id="blocks"></main>

<a href="../" id="next-project">
  <div>
    <div class="np-label">SIGUIENTE PROYECTO</div>
    <div class="np-title" id="np-title">Michelob Ultra NBA</div>
  </div>
  <div class="np-arrow">→</div>
</a>

</div>

<script>
// ── CURSOR ────────────────────────────────────────────────────────────
const cur = document.getElementById('cur');
const curR = document.getElementById('cur-r');
let rx = 0, ry = 0;
document.addEventListener('mousemove', e => {
  cur.style.left = e.clientX + 'px'; cur.style.top = e.clientY + 'px';
});
(function lerpCursor() {
  const tx = parseFloat(cur.style.left) || 0;
  const ty = parseFloat(cur.style.top)  || 0;
  rx += (tx - rx) * 0.12; ry += (ty - ry) * 0.12;
  curR.style.left = rx + 'px'; curR.style.top = ry + 'px';
  requestAnimationFrame(lerpCursor);
})();

// ── ENTRY — ocultar overlay al cargar ────────────────────────────────────────────
const pf = document.getElementById('pf-fade');
pf.style.opacity = '0';

// ── BACK — navegación directa sin efectos (debug) ────────────────────────────────
document.getElementById('back-btn').addEventListener('click', e => {
  e.preventDefault();
  sessionStorage.setItem('returnPanel', 'WORK');
  sessionStorage.setItem('returnFlag',  '1');
  sessionStorage.setItem('fromProject', '1');
  sessionStorage.setItem('fromProjectIdx', '0');
  window.location.href = '../?r=' + Date.now();
});

// ── NEXT PROJECT ──────────────────────────────────────────────────────
document.getElementById('next-project').addEventListener('click', e => {
  e.preventDefault();
  sessionStorage.setItem('returnPanel', 'WORK');
  sessionStorage.setItem('returnFlag',  '1');
  window.location.href = '../michelob-ultra/';
});

// ── PROJECT DATA ──────────────────────────────────────────────────────
const PROJECT = {
  slug:  'rachin',
  title: 'Rachin',
  client:'Original IP',
  year:   2024,
  cat:   ['Motion', '3D'],
  col:   [0.42, 0.62, 1.00],
  // Hero: usa Vimeo genérico como placeholder hasta tener el video real
  hero: {
    type: 'video',
    src:  'https://player.vimeo.com/video/1176108354?autoplay=1&loop=1&muted=1&background=1',
  },
  blocks: [
    {
      type:    'section-label',
      content: 'Overview',
    },
    {
      type:    'text',
      content: 'Rachin es un personaje original desarrollado como proyecto personal. Una campaña 360 completa que combina animación 3D fotorrealista, motion graphics y producción asistida por IA — todo ejecutado desde concepto hasta entrega final.',
    },
    {
      type:    'video',
      src:     'https://player.vimeo.com/video/1176108354',
      caption: 'Spot principal — :30s',
    },
    {
      type:    'quote',
      content: 'La pregunta no era qué podía hacer la IA, sino qué podía hacer yo con ella.',
    },
    {
      type:    'section-label',
      content: 'Proceso',
    },
    {
      type:    'text',
      content: 'El proceso de producción tomó 3 semanas. El personaje fue modelado en ZBrush, rigged en Maya, y compuesto en Cinema 4D con Redshift. Los frames de IA se generaron con Midjourney y Kling, integrados al pipeline de compositing.',
    },
    {
      type:    'image-grid',
      cols:     2,
      items: [
        { src: '', caption: 'Exploración de personaje' },
        { src: '', caption: 'Lighting setup' },
      ],
    },
    {
      type:    'video',
      src:     'https://player.vimeo.com/video/1176108354',
      caption: 'Making of — proceso completo',
    },
  ],
};

// ── RENDER ────────────────────────────────────────────────────────────
(function render(p) {
  const accent = 'rgb(58,102,204)';
  document.documentElement.style.setProperty('--accent', accent);
  document.title = `${p.title} — Nifdel Rivera`;
  document.getElementById('nav-title').textContent    = p.title.toUpperCase();
  document.getElementById('meta-client').textContent  = p.client;
  document.getElementById('meta-year').textContent    = p.year;
  document.getElementById('meta-tags').innerHTML      =
    p.cat.map(c => `<span class="meta-tag">${c}</span>`).join('');

  // Hero
  const hero = document.getElementById('hero');
  if (p.hero.type === 'video') {
    hero.innerHTML = `
      <iframe src="${p.hero.src}" frameborder="0" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen></iframe>
      <div class="hero-overlay"></div>
      <div class="hero-meta">
        <div class="hero-cat">${p.cat[0].toUpperCase()}</div>
        <div class="hero-title">${p.title}</div>
      </div>`;
  } else {
    hero.innerHTML = `
      <img src="${p.hero.src}" alt="${p.title}">
      <div class="hero-overlay"></div>
      <div class="hero-meta">
        <div class="hero-cat">${p.cat[0].toUpperCase()}</div>
        <div class="hero-title">${p.title}</div>
      </div>`;
  }

  // Blocks
  const container = document.getElementById('blocks');
  p.blocks.forEach(b => {
    const el = document.createElement('div');
    let caption = null;
    switch (b.type) {
      case 'section-label':
        el.className   = 'block-section-label';
        el.textContent = b.content;
        break;
      case 'text':
        el.className   = 'block-text';
        el.textContent = b.content;
        break;
      case 'video':
        el.className = 'block-video';
        el.innerHTML = `<iframe src="${b.src}" frameborder="0" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen></iframe>`;
        caption = b.caption || null;
        break;
      case 'quote':
        el.className   = 'block-quote';
        el.textContent = b.content;
        break;
      case 'image':
        el.className = `block-image${b.layout === 'full' ? ' full' : ''}`;
        el.innerHTML = b.src
          ? `<img src="${b.src}" alt="${b.caption || ''}">`
          : `<div class="block-placeholder"><span>↑ IMAGEN</span><span>${b.caption || 'PLACEHOLDER'}</span></div>`;
        caption = b.caption || null;
        break;
      case 'image-grid':
        el.className = `block-grid cols-${b.cols || 2}`;
        el.innerHTML = b.items.map(item =>
          item.src
            ? `<img src="${item.src}" alt="${item.caption || ''}">`
            : `<div class="block-placeholder" style="aspect-ratio:16/9"><span>↑ IMAGEN</span><span>${item.caption || ''}</span></div>`
        ).join('');
        break;
      case 'embed':
        el.className = 'block-embed';
        el.style.aspectRatio = b.aspectRatio || '16/9';
        el.innerHTML = `<iframe src="${b.src}" frameborder="0" allowfullscreen></iframe>`;
        break;
    }
    container.appendChild(el);
    if (caption) el.insertAdjacentHTML('afterend', `<p class="block-caption">${caption}</p>`);
  });
})(PROJECT);
</script>
</body>
</html>
